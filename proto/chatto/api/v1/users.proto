syntax = "proto3";

package chatto.api.v1;

import "chatto/api/v1/presence.proto";
import "chatto/api/v1/user_status.proto";

// Public user fields.
message User {
  // Stable user ID.
  string id = 1;
  // Login name.
  string login = 2;
  // Display name, when set.
  string display_name = 3;
  // True when the user account has been deleted.
  bool deleted = 4;
  // Avatar image URL, when available.
  optional string avatar_url = 5;
  // Current live presence status.
  PresenceStatus presence_status = 6;
  // Custom profile status, when set.
  CustomUserStatus custom_status = 7;
}
